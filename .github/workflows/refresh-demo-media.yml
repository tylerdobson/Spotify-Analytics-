name: Refresh demo media

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "app.py"
      - "spotify_client.py"
      - "visualizations.py"
      - "data_processor.py"
      - "config.py"
      - "scripts/capture_media.js"
      - "package.json"
      - "requirements.txt"
      - ".github/workflows/refresh-demo-media.yml"

permissions:
  contents: write

jobs:
  capture:
    if: github.actor != 'github-actions[bot]' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install system video tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright dependencies
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Start Streamlit demo server
        shell: bash
        run: |
          SPOTIFY_DEMO_MODE=true streamlit run app.py --server.port 8502 --server.headless true --browser.gatherUsageStats false &
          for attempt in {1..60}; do
            if curl -fsS http://localhost:8502/_stcore/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Streamlit did not become ready in time."
          exit 1

      - name: Capture fresh demo media
        run: npm run capture:media -- --url http://localhost:8502

      - name: Remove obsolete media
        run: |
          git rm -r --ignore-unmatch docs/screenshots docs/proof docs/screenshots_jpg

      - name: Commit refreshed media
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/demo docs/PORTFOLIO_PROOF.md README.md scripts/capture_media.js app.py package.json .gitignore
          if git diff --cached --quiet; then
            echo "No media changes to commit."
          else
            git commit -m "Refresh portfolio demo media"
            git push
          fi
